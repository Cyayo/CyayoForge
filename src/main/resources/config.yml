# ╔══════════════════════════════════════════════╗
# ║         CyayoForge - Konfigurasi Utama       ║
# ╚══════════════════════════════════════════════╝

# ┌─────────────────────────────────────────────┐
# │              PENGATURAN ANIMASI             │
# └─────────────────────────────────────────────┘
animation:
  enabled: true
  duration-ticks: 200
  delay-before-minigame: 10
  title: "&8⚒ &6Menempa..."
  subtitle: "&7Harap tunggu..."
  sounds:
    - sound: BLOCK_FIRE_AMBIENT
      delay: 0
      volume: 1.0
      pitch: 1.0
    - sound: BLOCK_ANVIL_USE
      delay: 30
      volume: 1.0
      pitch: 0.8
    - sound: BLOCK_ANVIL_USE
      delay: 55
      volume: 1.0
      pitch: 1.0
    - sound: BLOCK_FIRE_EXTINGUISH
      delay: 80
      volume: 1.0
      pitch: 1.0
    - sound: BLOCK_ANVIL_USE
      delay: 110
      volume: 1.0
      pitch: 0.9
    - sound: BLOCK_ANVIL_USE
      delay: 135
      volume: 1.0
      pitch: 1.1
    - sound: BLOCK_FIRE_EXTINGUISH
      delay: 170
      volume: 1.0
      pitch: 1.2

# ┌─────────────────────────────────────────────┐
# │              PENGATURAN MINIGAME            │
# └─────────────────────────────────────────────┘
minigame:
  enabled: true
  
  # Durasi setiap fase warna dalam ticks (20 = 1 detik)
  phase-duration-ticks:
    min: 6
    max: 12

  rounds:
    min: 5
    max: 10

  # Delay antara angka countdown (3... 2... 1...) dalam ticks
  countdown_delay_ticks: 12

  # Bonus persentase poin berdasarkan permission player
  # Format: permission: bonus_persentase
  permission_bonuses:
    cyayoforge.bonus.apprentice: 5.0
    cyayoforge.bonus.master: 15.0
    cyayoforge.bonus.grandmaster: 30.0

  # Penalti jika player sengaja menutup GUI minigame saat berlangsung
  penalty:
    enabled: true
    # Durasi cooldown dalam detik (60 = 1 menit)
    duration: 300

  points:
    perfect: 3
    good: 1
    broken: -2
    miss: -3

  # ┌─────────────────────────────────────────────┐
  # │              PENGATURAN KUALITAS            │
  # └─────────────────────────────────────────────┘
  quality_threshold:
    perfect: 100.0
    exquisite: 75.0
    good: 50.0
    flawed: 25.0
    broken: 0.0

  quality_bonus:
    perfect:
      bonus: 10.0
    exquisite:
      bonus: 7.0
    good:
      bonus: 5.0
    flawed:
      bonus: 0.0
    broken:
      bonus: -5.0

  quality_stat_string:
    perfect: "<gradient:#EFEAA5:#D4950A>Mahakarya ☀</gradient>"
    exquisite: "<gradient:#87CEEB:#1E90FF>Istimewa</gradient>"
    good: "<gradient:#90EE90:#32CD32>Bagus</gradient>"
    flawed: "<gradient:#FFA500:#FF8C00>Biasa</gradient>"
    broken: "<gradient:#FF6347:#DC143C>Rapuh ☠</gradient>"
    
  tier_display_names:
    POOR: "<#545454>P<#636363>o<#727272>o<#818181>r"
    GOOD: "<#079C01>G<#2DBD3A>o<#54DE72>o<#7AFFAB>d"
    GREAT: "<#0093FF>G<#1FAAFF>r<#3DC0FF>e<#5CD7FF>a<#7AEDFF>t"
    ANCIENT: "<#B9FF00>A<#C0FF19>n<#C7FF32>c<#CEFF4C>i<#D4FF65>e<#DBFF7E>n<#E2FF97>t"
    RELIC: "<#870202>R<#9B0505>e<#AE0808>l<#C20A0A>i<#D50D0D>c"
    SECRET: "<#e6f7fa>Secret"

  # ┌─────────────────────────────────────────────┐
  # │              PENGATURAN KUALITAS            │
  # └─────────────────────────────────────────────┘
  quality_lore_format: " &7Kualitas : {value}"

  # Placeholder untuk meletakkan Kualitas di barisan Lore tertentu.
  # Letakkan teks ini di dalam Lore template MMOItems kamu.
  quality_placeholder: "%%QUALITY%%"
  
  # Jika placeholder tidak ditemukan di lore, apakah tetap ditambahkan di baris paling bawah?
  append_quality_if_no_placeholder: false

  # Injeksi Kualitas ke Custom Stat MMOItems
  custom_stat:
    enabled: true
    id: "CUSTOM_QUALITY"

  # ┌─────────────────────────────────────────────┐
  # │              PENGATURAN PENEMPA             │
  # └─────────────────────────────────────────────┘
  penempa_lore_format: " &7Penempa : {value}"
  
  # Placeholder untuk meletakkan Nama Penempa di barisan Lore tertentu.
  # Letakkan teks ini di dalam Lore template MMOItems kamu.
  penempa_placeholder: "%%PENEMPA%%"
  
  # Jika placeholder tidak ditemukan di lore, apakah tetap ditambahkan di baris paling bawah?
  append_penempa_if_no_placeholder: false

  # Injeksi Penempa ke Custom Stat MMOItems
  custom_penempa:
    enabled: true
    id: "CUSTOM_PENEMPA"

  # ┌─────────────────────────────────────────────┐
  # │               PENGATURAN SUARA              │
  # └─────────────────────────────────────────────┘
  bypass_quality_mode: FIXED
  bypass_quality_fixed: FLAWED

  sound_spawn:
    sound: BLOCK_NOTE_BLOCK_PLING
    volume: 0.8
    pitch: 1.0

  sound_countdown:
    sound: BLOCK_NOTE_BLOCK_PLING
    volume: 0.8
    pitch: 1.5

  sound_perfect:
    sound: ENTITY_PLAYER_LEVELUP
    volume: 1.0
    pitch: 1.2

  sound_good:
    sound: BLOCK_NOTE_BLOCK_BELL
    volume: 0.8
    pitch: 1.0

  sound_broken:
    sound: BLOCK_ANVIL_LAND
    volume: 1.0
    pitch: 0.8

  sound_miss:
    sound: ENTITY_VILLAGER_NO
    volume: 1.0
    pitch: 1.0

  sound_finish:
    sound: BLOCK_ANVIL_USE
    volume: 1.0
    pitch: 1.5

# ┌─────────────────────────────────────────────┐
# │              PENGATURAN COMMAND             │
# └─────────────────────────────────────────────┘
command:
  give:
    # Apakah command /forge give akan menyertakan data penempa?
    inject_penempa: false

# ┌─────────────────────────────────────────────┐
# │              PENGATURAN GUI                 │
# └─────────────────────────────────────────────┘
gui:
  placeholders:
    tier: "{tier}"
    multiplier: "{multiplier}"
    output_type: "{output_type}"
    material_composition: "{material_composition}"
    output_list: "{output_list}"
    category_lore: "{category_lore}"
  sound_open:
    sound: BLOCK_CHEST_OPEN
    volume: 1.0
    pitch: 1.0
  sound_close:
    sound: BLOCK_CHEST_CLOSE
    volume: 1.0
    pitch: 1.0
  sound_fail:
    sound: ENTITY_VILLAGER_NO
    volume: 1.0
    pitch: 1.0
  sound_add_material:
    sound: BLOCK_NOTE_BLOCK_BIT
    volume: 1.0
    pitch: 1.2
  sound_remove_material:
    sound: BLOCK_NOTE_BLOCK_BIT
    volume: 1.0
    pitch: 0.8
  sound_switch_type:
    sound: UI_BUTTON_CLICK
    volume: 1.0
    pitch: 1.0

# ┌─────────────────────────────────────────────┐
# │             PENGATURAN TEMPA               │
# └─────────────────────────────────────────────┘
forging:
  hard_cap: 2.5
  ability_damage_percent: 12.0
  ability_threshold_percent: 25.0

  sound_success:
    sound: BLOCK_ANVIL_USE
    volume: 1.0
    pitch: 1.2

# ┌─────────────────────────────────────────────┐
# │              PENGATURAN DATA               │
# └─────────────────────────────────────────────┘
data:
  storage: YAML

# ┌─────────────────────────────────────────────┐
# │              PENGATURAN SALVAGE             │
# └─────────────────────────────────────────────┘
salvage:
  enabled: true
  return_percentage: 0.5
  
  # Format penulisan list material di Lore
  material_list_format: " &8• &f{amount}x {material}"

  # Gunakan multiplier waktu berdasarkan kualitas? (Jika false, hanya pakai base_time_per_tier)
  use_quality_multiplier: true

  # Waktu dasar berdasarkan Tier (dalam detik)
  base_time_per_tier:
    POOR: 60
    GOOD: 150
    GREAT: 450
    ANCIENT: 900
    RELIC: 1800
    SECRET: 3600

  # Multiplier waktu berdasarkan Kualitas
  quality_time_multiplier:
    PERFECT: 2.5
    EXQUISITE: 1.8
    GOOD: 1.2
    FLAWED: 0.8
    BROKEN: 0.4
