# ╔══════════════════════════════════════════════╗
# ║        CyayoForge - Konfigurasi Material     ║
# ╚══════════════════════════════════════════════╝
#
# Key utama = MMOITEMS_ITEM_ID dari item MMOItems (huruf besar)
#
# ┌─────────────────────────────────────────────┐
# │             PENGGUNAAN STATS                │
# └─────────────────────────────────────────────┘
# Mode penambahan stat (berlaku untuk weapon.stats & armor.stats):
#   Mode FIXED    - (Default jika ditulis singkat) Menambah stat secara flat
#   Mode MULTIPLY - Mengalikan nilai stat yang sudah ada
#   Mode RANDOM   - Memberikan nilai acak antara rentang min & max
#
# Daftar Stat Umum MMOItems yang didukung:
#   - ATTACK_SPEED          - MAX_HEALTH
#   - ATTACK_DAMAGE         - ARMOR
#   - CRITICAL_STRIKE_CHANCE - ARMOR_TOUGHNESS
#   - CRITICAL_STRIKE_POWER - MOVEMENT_SPEED
#   - MAGIC_DAMAGE          - KNOCKBACK_RESISTANCE
#   - PROJECTILE_DAMAGE     - BLOCK_POWER
#   - DODGE_RATING          - BLOCK_RATING
#   - PVE_DAMAGE            - PVP_DAMAGE
#   - ... dan stat MMOItems valid lainnya.
#
# Contoh Penulisan:
#   weapon:
#     stats:
#       # Singkat (FIXED)
#       ATTACK_SPEED: 0.2
#       # Format Panjang (FIXED/MULTIPLY)
#       MAX_HEALTH:
#         mode: MULTIPLY
#         value: 1.15
#       # Format RANDOM
#       CRITICAL_STRIKE_CHANCE:
#         mode: RANDOM
#         min: 2.0
#         max: 5.0
#
# ┌─────────────────────────────────────────────┐
# │             PENGGUNAAN ABILITIES            │
# └─────────────────────────────────────────────┘
# Menambahkan skill/ability MythicLib ke item tempaan.
# Hanya bekerja jika item dasar (output resep) membolehkan ability.
#
# Contoh:
#   weapon:
#     abilities:
#       - ability: "FIREBALL"          # ID skill dari MythicLib/MMOItems
#         trigger: "RIGHT_CLICK"       # Trigger (RIGHT_CLICK, SHIFT_LEFT_CLICK, dll)
#         modifiers:                   # Modifier skill (akan di-roll antara min dan max)
#           cooldown:
#             min: 5.0
#             max: 10.0
#           duration:
#             min: 2.0
#             max: 5.0
#         # Catatan: Modifier "damage" diatur secara otomatis berdasarkan
#         # persentase base damage senjata (yang sudah ditambah bonus kualitas).
#
# ┌─────────────────────────────────────────────┐
# │             PENGGUNAAN BASE STATS           │
# └─────────────────────────────────────────────┘
# Multiplier dasar yang diterapkan ke stat utama item:
#   damage_multiplier            - Multiplier untuk ATTACK_DAMAGE (Weapon)
#   health_multiplier            - Multiplier untuk MAX_HEALTH (Armor)
#   defense_multiplier           - Multiplier untuk ARMOR (Armor)
#   armor_multiplier             - Multiplier tambahan untuk ARMOR (Armor)
#   critical_damage_multiplier   - Multiplier untuk CRITICAL_STRIKE_POWER (Weapon)
#

