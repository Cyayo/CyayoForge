# ╔══════════════════════════════════════════════╗
# ║        CyayoForge - Menu Inspection          ║
# ╚══════════════════════════════════════════════╝

title: "&8Item Inspection"
size: 45

# Item yang di-inspect akan otomatis diletakkan di posisi 'I' pada layout
# Jika 'I' tidak ada, akan menggunakan target-slot ini sebagai fallback
target-slot: 13

# Layout menu
# I = Inspect Item (Target)
# M = Materials (Max 4 slots)
# S = Smith Info (Penempa)
# Q = Quality Info
# # = Dekorasi (Glass)
# " " (Spasi) = Slot Kosong (Air)
layout:
  - "#########"
  - "#   I   #"
  - "#       #"
  - "#MMMM SQ#"
  - "#########"

# Item dekorasi dan informasi
items:
  filler:
    material: BLACK_STAINED_GLASS_PANE
    name: " "
    
  smith:
    material: PLAYER_HEAD
    name: "&6&lINFO PENEMPA"
    lore:
      - "&7Ditempa oleh: &f{smith}"
      - "&7Waktu: &f{date}"
      
  quality:
    material: NETHER_STAR
    name: "&b&lKUALITAS TEMPA"
    lore:
      - "&7Hasil Kualitas: {quality_display}"
      - "&7Bonus Damage: &a+{bonus}%"

# Pengaturan tampilan material yang digunakan
material-style:
  name: "&eMaterial: &f{name}"
  lore:
    - "&7Status: &aTervalidasi"
    - ""
    - "&eDigunakan: &f{amount}x"
