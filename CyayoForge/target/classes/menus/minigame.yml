# ╔══════════════════════════════════════════════╗
# ║        CyayoForge - Konfigurasi Minigame GUI ║
# ╚══════════════════════════════════════════════╝

# ────────────────────────────────────────────────
# Pengaturan Utama
# ────────────────────────────────────────────────
title: "&8⚒ Menempa &8- &eMinigame"

# Background filler (semua slot non-interaktif)
background:
  material: GRAY_STAINED_GLASS_PANE
  name: " "

# ────────────────────────────────────────────────
# Slot 4 - Item Informasi
# ────────────────────────────────────────────────
info_item:
  slot: 4
  material: BOOK
  name: "&eMinigame Tempa"
  lore:
    - "&7Ronde: &f{current_round}&8/&f{total_rounds}"
    - "&7Poin: &f{total_points}"
    - "&7{status}"
    - ""
    - "&a■ &fHijau &8= Sempurna &7(+{perfect})"
    - "&e■ &fKuning &8= Bagus &7(+{good})"
    - "&c■ &fMerah &8= Rusak &7({broken})"
    - "&8■ &fMeleset &8= Buruk &7({miss})"

# ────────────────────────────────────────────────
# Countdown Awal Ronde
# ────────────────────────────────────────────────
countdown:
  slots: [20, 22, 24]
  materials:
    3: RED_DYE
    2: YELLOW_DYE
    1: LIME_DYE
  names:
    3: "&c3"
    2: "&e2"
    1: "&a1"

# ────────────────────────────────────────────────
# Fase Hit (Klik Item Warna)
# ────────────────────────────────────────────────
hit_phase:
  lime:
    material: LIME_DYE
    name: "&aSempurna!"
  yellow:
    material: YELLOW_DYE
    name: "&eKlik! &7(Bagus)"
  red:
    material: RED_DYE
    name: "&cRusak..."

# ────────────────────────────────────────────────
# Pesan Status (Placeholder {status} di info_item)
# ────────────────────────────────────────────────
status:
  idle: "&eKlik item saat warna yang tepat!"
  perfect: "&aSempurna! &7(+{pts} poin)"
  good: "&eBagus! &7(+{pts} poin)"
  broken: "&cRusak! &7({pts} poin)"
  miss: "&4Meleset! &7({pts} poin)"
