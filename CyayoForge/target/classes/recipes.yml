# ╔══════════════════════════════════════════════╗
# ║       CyayoForge - Konfigurasi Resep         ║
# ╚══════════════════════════════════════════════╝
#
# Sistem resep berbasis RENTANG material:
# - recipe: jumlah material minimum untuk resep ini aktif
# - Sistem otomatis memilih resep tertinggi yang <= jumlah material
# - Contoh: 5 material = DAGGER, 6 material = masih DAGGER (bukan KATANA)
#           8 material = KATANA, 11 material = masih KATANA
#           12 material = SWORD
#
# Sistem Permission (2 Jenis):
#
# 1. Permission Kategori (Category Permission):
#    Diletakkan di bawah nama kategori. Jika player tidak punya permission ini,
#    kategori tersebut tidak akan muncul di GUI dan tidak bisa dibuat (akan diabaikan).
#    Contoh:
#    spear:
#      type: SPEAR
#      recipe: 18
#      permission: "cyayoforge.category.spear"
#
# 2. Permission Item (Item Permission):
#    Diletakkan di bawah output item. Jika player tidak punya permission ini,
#    item tersebut tidak akan muncul di preview/output list resep tersebut.
#
# 3. Akses Region (Region Access):
#    Diletakkan di kategori atau item dengan kunci 'regions'. 
#    Player bisa mengakses resep tersebut jika berada di dalam salah satu region WG tersebut,
#    meskipun tidak memiliki permission yang dibutuhkan.
#    Contoh:
#    regions:
#      - "forge_area"
#      - "spawn"
#

